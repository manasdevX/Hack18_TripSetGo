<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <linearGradient id="gradArrowL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="gradArrowR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <!-- Compass Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#38bdf8" stroke-width="24" />
  <!-- Compass Marks -->
  <line x1="256" y1="20" x2="256" y2="46" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" />
  <line x1="256" y1="466" x2="256" y2="492" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" />
  <line x1="20" y1="256" x2="46" y2="256" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" />
  <line x1="466" y1="256" x2="492" y2="256" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" />
  <!-- 3D Chevron Arrow pointing NE -->
  <g transform="rotate(45 256 256)">
    <!-- Left side -->
    <path d="M 256 100 L 256 412 L 130 350 Z" fill="url(#gradArrowL)" />
    <!-- Right side -->
    <path d="M 256 100 L 382 350 L 256 412 Z" fill="url(#gradArrowR)" />
